<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MotorCraft LAB - Головна</title>

    <meta name="description"
          content="MotorCraft LAB — професійна автомобільна майстерня повного циклу.">

    <link rel="icon"
          type="image/png"
          href="img/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html, body{
            height:100%;
        }

        body{
            background:#f5f5f5;
            font-family:Arial,sans-serif;

            display:flex;
            flex-direction:column;
        }

        main{
            flex:1;
        }

        .navbar{
            background:#fff;
            padding:20px 0;
        }

        .navbar-brand{
            font-weight:700;
        }

        .nav-link{
            color:#000;
            font-size:14px;
        }

        .section{
            background:#fff;
            border-radius:20px;
            padding:40px;
            margin-top:40px;
        }

        .badge-custom{
            display:inline-block;
            background:#000;
            color:#fff;
            padding:6px 15px;
            border-radius:20px;
            font-size:12px;
            margin-bottom:25px;
        }

        h1{
            font-size:48px;
            font-weight:700;
            margin-bottom:25px;
        }

        .hero-text{
            color:#666;
            max-width:400px;
        }

        .section-title{
            font-size:32px;
            font-weight:700;
            margin-bottom:40px;
        }

        .facts{
            margin-top:60px;
        }

        .fact-card{
            background:#f7f7f7;
            border-radius:15px;
            padding:25px;
            text-align:center;
        }

        .fact-card h2{
            font-size:32px;
            font-weight:700;
        }

        .fact-card p{
            color:#666;
            font-size:14px;
        }

        img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:15px;
        }

        footer{
            background:#fff;
            padding:20px 0;
            margin-top:40px;
        }

        .socials a{
            text-decoration:none;
            color:#000;
            margin-left:20px;
            font-size:14px;
        }

        @media(max-width:992px){

            h1{
                font-size:36px;
            }

            img{
                margin-top:30px;
            }

        }

    </style>

</head>
<body>

<header>

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand"
               href="index.html">

                MotorCraft LAB

            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end"
                 id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="index.html">

                            Головна

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="services.html">

                            Послуги

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="about.html">

                            Про нас

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

</header>

<main>

<section class="container">

    <div class="section">

        <span class="badge-custom">
            01 / ГОЛОВНА
        </span>

        <div class="row align-items-center">

            <div class="col-lg-6">

                <h1>
                    MotorCraft LAB
                </h1>

                <p class="hero-text">
                    Професійна автомобільна майстерня повного циклу
                </p>

            </div>

            <div class="col-lg-6">

                <img src="img/car.png"
                     alt="Автомобіль MotorCraft LAB">

            </div>

        </div>

        <div class="facts">

            <h2 class="section-title">
                Досягнення
            </h2>

            <div class="row g-4">

                <div class="col-lg-3 col-md-6">

                    <div class="fact-card">

                        <h2>1000+</h2>

                        <p>задоволених клієнтів</p>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="fact-card">

                        <h2>6 років</h2>

                        <p>досвіду</p>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="fact-card">

                        <h2>12</h2>

                        <p>місяців гарантії</p>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="fact-card">

                        <h2>Сучасне</h2>

                        <p>обладнання</p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</main>

<footer>

    <div class="container d-flex justify-content-between align-items-center">

        <p class="mb-0">
            MotorCraft LAB © 2020
        </p>

        <div class="socials">

            <a href="#">
                Instagram
            </a>

            <a href="#">
                Facebook
            </a>

            <a href="#">
                Telegram
            </a>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
